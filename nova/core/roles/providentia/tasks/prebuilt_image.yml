---
- name: Check if previous installation exists
  ansible.builtin.stat:
    path: /{{ providentia_install_dir }}/docker-compose.yml
  register: providentia_old_docker_compose

- name: Stop previous installation
  when: providentia_old_docker_compose.stat.exists
  community.docker.docker_compose_v2:
    project_src: "{{ providentia_install_dir }}"
    state: absent
    remove_orphans: true
    wait: true

- name: Use latest support files
  ansible.builtin.include_tasks: update_support_files.yml

- name: Pull the app image
  community.docker.docker_image_pull:
    name: ghcr.io/clarifiedsecurity/providentia
    tag: "{{ providentia_image_version }}"

- name: Get app image info
  community.docker.docker_image_info:
    name: ghcr.io/clarifiedsecurity/providentia:{{ providentia_image_version }}
  register: image_info

- name: Parse the semantic version of container image
  ansible.builtin.set_fact:
    providentia_worker_needed: "{{ providentia_version_major | int > 26 and providentia_version_minor | int >= 2 }}"
  vars:
    version_label: "{{ image_info.images[0].Config.Labels['org.opencontainers.image.version'] }}"
    providentia_version_major: "{{ version_label | regex_search('v?(\\d+)\\.', '\\1') | int }}"
    providentia_version_minor: "{{ version_label | regex_search('\\.(\\d+)\\.', '\\1') | int }}"
    providentia_version_patch: "{{ version_label | regex_search('\\.(\\d+)(?:[-+]|$)', '\\1') | int }}"

- name: Templating configuration
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ providentia_install_dir }}/"
    lstrip_blocks: true
    mode: "0644"
  loop:
    - compose.yaml
    - features.yml
    - .env
    - Makefile

- name: Include db migration
  ansible.builtin.include_tasks: migrate_db.yml

- name: Composing Providentia...
  community.docker.docker_compose_v2:
    project_src: "{{ providentia_install_dir }}"
    state: present
    remove_orphans: true
    build: never
    wait: true

- name: Remove old docker compose config
  when: providentia_old_docker_compose.stat.exists
  ansible.builtin.file:
    path: "{{ providentia_install_dir }}/docker-compose.yml"
    state: absent
