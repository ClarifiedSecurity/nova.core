---
- name: Creating {{ custom_vm_name | default(vm_name) }}...
  ansible.builtin.command:
    orchard create vm {{ custom_vm_name | default(vm_name) }}
    --image {{ orchard_vm_image }} --restart-policy OnFailure --net-softnet {{ '--os linux' if 'os_linux' in group_names else '--os darwin' }}
  changed_when: true
  become: false
  delegate_to: localhost
  when: not orchard_vm_exists | default(false) or fresh_deploy
